name: Build

on:
  push:
    branches:
      - dev


jobs:
  code-smells:
    name: Designate analysis
    runs-on: ubuntu-latest
    steps:
      - name: Run Designite analysis for the latest commit
        id: designite
        uses: DesigniteTools/DJAction@v2.0
        with:
          PAT: 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

      - name: DesigniteJava incremental code quality analysis and issue creation
        uses: DesigniteTools/dj-incremental-analysis@v1.0.0
        with:
          github-token: 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
          designite-output-old: designite-output-${{ github.event.before }}
          designite-output-new: designite-output-${{ github.sha }}
          repo-name: ${{ github.repository }}
  build:
    name: SonarQube Analysis
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu' # Alternative distribution options are available.
      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: Build and analyze
        env:
          SONAR_TOKEN: sqp_6850cd30e8cb93f475c0e602b31595ea4448faaa
          SONAR_HOST_URL: http://proxy.nitheesh.me:27923
        run: mvn -B -X clean compile org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=sismics-reader-dev -Dsonar.projectName='sismics-reader-dev'
